# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build
on:
  push:
    branches:
      - main
    tags: ["v*"]
env:
  CARGO_TERM_COLOR: always
jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update local toolchain
        run: |
          rustup update stable
          rustup component add rustfmt
      - name: Toolchain info
        run: |
          cargo --version --verbose
          rustc --version
      - name: Run unit tests
        run: |
          cargo test --all
      - name: Run rust-example compiling tests
        run: |
          (cd tests/rust-basic && cargo run -p land-cli build)
  build_cli:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
    steps:
      - uses: actions/checkout@v3
      - name: Update local toolchain
        run: |
          rustup update stable
          rustup component add rustfmt
      - name: Toolchain info
        run: |
          cargo --version --verbose
          rustc --version
      - name: Build CLI
        run: |
          cargo build --release -p land-cli
          cp target/release/land-cli land-cli-${{ matrix.os }}-${{ matrix.arch }}
          tar -czvf land-cli-${{ matrix.os }}-${{ matrix.arch }}.tar.gz land-cli-${{ matrix.os }}-${{ matrix.arch }}
      - name: Upload CLI
        uses: actions/upload-artifact@v2
        with:
          name: land-cli
          path: land-cli-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
