[package]
name = "land-cli"
version = { workspace = true }
edition = { workspace = true }
authors = { workspace = true }
license-file = { workspace = true }
repository = { workspace = true }
homepage = { workspace = true }
publish = false
autoexamples = false
readme = "README.md"
documentation = { workspace = true }
description = "Runtime Land is a runtime for serverless functions based on WebAssembly"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
color-print = { workspace = true }
dirs = "5.0.1"
flate2 = "1.0.28"
inquire = "0.6.2"
land-common = { workspace = true }
land-compiler = { workspace = true }
land-worker-server = { workspace = true }
regex = { workspace = true }
rust-embed = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tar = "0.4.40"
tokio = { workspace = true }
tracing = { workspace = true }
ureq = { workspace = true }
url = "2.5.0"
walkdir = { workspace = true }

[build-dependencies]
land-compiler = { workspace = true }

[workspace.package]
version = "0.2.0"
edition = "2021"
authors = ["fuxiaohei <fudong0797@gmail.com>"]
license-file = "LICENSE"
repository = "https://github.com/fuxiaohei/runtime-land"
homepage = "https://runtime.land"
documentation = "https://runtime.land/docs"

[workspace]
members = [
    "binary/cloud-server",
    "binary/runner",
    "crates/api-server",
    "crates/common",
    "crates/compiler",
    "crates/dblayer",
    "crates/sdk",
    "crates/sdk-macro",
    "crates/web-server",
    "crates/worker",
    "crates/worker-server",
    "tests/sdk-demo",
]

[workspace.dependencies]
land-common = { path = "crates/common" }
land-compiler = { path = "crates/compiler" }
land-worker = { path = "crates/worker" }
land-sdk-macro = { path = "crates/sdk-macro" }
land-worker-server = { path = "crates/worker-server" }
land-api-server = { path = "crates/api-server" }
land-web-server = { path = "crates/web-server" }
land-sdk = { path = "crates/sdk" }
land-dblayer = { path = "crates/dblayer" }
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = [
    "time",
    "local-time",
    "env-filter",
] }
wasmtime = { version = "15.0.1", features = ["component-model", "async"] }
wasmtime-wasi = "15.0.1"
hyper = { version = "1.0.1", features = ["full"] }
wit-bindgen-core = "0.16.0"
wit-bindgen-rust = "0.16.0"
wit-component = "0.19.0"
anyhow = "1.0.75"
tokio = { version = "1.35.0", features = ["full"] }
http = "1.0.0"
bytes = "1.5.0"
lazy_static = "1.4.0"
wit-bindgen = "0.16.0"
axum = "0.7.2"
axum-core = "0.4.1"
futures-util = "0.3.29"
http-body = "1.0.0"
http-body-util = "0.1.0"
serde = { version = "1.0.193", features = ["derive"] }
serde_json = "1.0.108"
toml = "0.8.8"
color-print = "0.3.5"
clap = { version = "4.4.11", features = ["derive", "env"] }
once_cell = "1.19.0"
async-trait = "0.1.74"
rust-embed = { version = "8.1.0", features = ["include-exclude"] }
tower-http = { version = "0.5.0", features = [
    "timeout",
    "cors",
    "fs",
    "trace",
] }
axum-extra = { version = "0.9.0", features = ["cookie"] }
base64 = "0.21.5"
reqwest = { version = "0.11.22", default-features = false, features = [
    "stream",
    "rustls-tls",
    "blocking",
    "json",
    "multipart",
] }
time = "0.3.30"
chrono = "0.4.31"
uuid = { version = "1.6.1", features = ["v4"] }
regex = "1.10.2"
ureq = { version = "2.9.1", features = ["http-crate", "json"] }
walkdir = "2.4.0"
